# ─────────────────────────────────────────────────────────────────────────────
# Debrief deploy pipeline (Plan B — Fargate + ALB).
#
# Triggered on push to master. End-to-end:
#   1. Run unit tests (gate the deploy)
#   2. Assume the GitHub OIDC role from DebriefBootstrapStack
#   3. cdk deploy DebriefDataStack + DebriefComputeStack (idempotent)
#   4. Build the Next.js container, push :latest + :${SHA} to ECR
#   5. Force a new Fargate deployment, wait for service stable
#   6. Smoke-test /api/health on the ALB
#
# Resource identifiers (ECR URI, ECS cluster/service, ALB DNS) are looked
# up from CloudFormation outputs at runtime, so the only GitHub repo
# secret needed is AWS_DEPLOY_ROLE_ARN. Everything else self-resolves.
#
# Required GitHub repo secret:
#   AWS_DEPLOY_ROLE_ARN   ARN of the debrief-github-deploy role, output
#                         by DebriefBootstrapStack on first deploy.
# ─────────────────────────────────────────────────────────────────────────────

name: deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-master
  cancel-in-progress: false

env:
  AWS_REGION: ca-central-1
  DATA_STACK: DebriefDataStack
  COMPUTE_STACK: DebriefComputeStack
  GITHUB_REPO: ${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.1.42"

      - name: Install app dependencies
        working-directory: app
        run: bun install --frozen-lockfile

      - name: Run app unit tests
        working-directory: app
        run: bun run test

      - name: Install infra dependencies
        working-directory: infra
        run: npm ci

      - name: Install Lambda dependencies (for CDK nodejs bundling)
        working-directory: infra/lambda/pipeline
        run: npm ci

      - name: Run Lambda unit tests
        working-directory: infra/lambda/pipeline
        run: npm test

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # CDK deploy is idempotent — only changed resources update.
      # DebriefBootstrapStack is excluded; it's deployed once manually
      # from CloudShell and self-references the CI/CD role.
      - name: cdk deploy (data + compute)
        working-directory: infra
        env:
          # Required by the bootstrap stack's synth-time guard. The other
          # stacks don't read it but synth runs all three.
          GITHUB_REPO: ${{ env.GITHUB_REPO }}
        run: |
          set -euo pipefail
          npx cdk deploy \
            "${{ env.DATA_STACK }}" \
            "${{ env.COMPUTE_STACK }}" \
            --require-approval never \
            --concurrency 2

      - name: Resolve stack outputs
        id: outputs
        run: |
          set -euo pipefail
          ECR_URI=$(aws cloudformation describe-stacks \
            --stack-name "${{ env.COMPUTE_STACK }}" \
            --query "Stacks[0].Outputs[?OutputKey=='EcrRepositoryUri'].OutputValue" \
            --output text)
          CLUSTER=$(aws cloudformation describe-stacks \
            --stack-name "${{ env.COMPUTE_STACK }}" \
            --query "Stacks[0].Outputs[?OutputKey=='EcsClusterName'].OutputValue" \
            --output text)
          SERVICE=$(aws cloudformation describe-stacks \
            --stack-name "${{ env.COMPUTE_STACK }}" \
            --query "Stacks[0].Outputs[?OutputKey=='EcsServiceName'].OutputValue" \
            --output text)
          ALB_DNS=$(aws cloudformation describe-stacks \
            --stack-name "${{ env.COMPUTE_STACK }}" \
            --query "Stacks[0].Outputs[?OutputKey=='AlbDnsName'].OutputValue" \
            --output text)
          echo "ecr_uri=$ECR_URI" >> "$GITHUB_OUTPUT"
          echo "cluster=$CLUSTER" >> "$GITHUB_OUTPUT"
          echo "service=$SERVICE" >> "$GITHUB_OUTPUT"
          echo "alb_dns=$ALB_DNS" >> "$GITHUB_OUTPUT"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push container image
        env:
          ECR_REPO: ${{ steps.outputs.outputs.ecr_uri }}
        run: |
          set -euo pipefail
          docker buildx build \
            --push \
            --platform linux/amd64 \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            -t "${ECR_REPO}:latest" \
            -t "${ECR_REPO}:${GITHUB_SHA}" \
            ./app

      # Fargate doesn't auto-redeploy on :latest the way App Runner did.
      # --force-new-deployment makes ECS pull the freshly-tagged :latest
      # and roll the service.
      - name: Force new Fargate deployment
        env:
          CLUSTER: ${{ steps.outputs.outputs.cluster }}
          SERVICE: ${{ steps.outputs.outputs.service }}
        run: |
          set -euo pipefail
          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "$SERVICE" \
            --force-new-deployment \
            --query 'service.deployments[0].id' \
            --output text

      - name: Wait for service stable
        env:
          CLUSTER: ${{ steps.outputs.outputs.cluster }}
          SERVICE: ${{ steps.outputs.outputs.service }}
        run: |
          set -euo pipefail
          aws ecs wait services-stable \
            --cluster "$CLUSTER" \
            --services "$SERVICE"
          echo "ECS service reached steady state."

      # Smoke test goes through the ALB DNS rather than the custom domain,
      # so it works before app.debriefmd.ca's CNAME has been added to
      # Squarespace. After DNS is set up, you can also reach this at
      # https://app.debriefmd.ca/api/health.
      - name: Smoke test /api/health (ALB direct)
        env:
          ALB_DNS: ${{ steps.outputs.outputs.alb_dns }}
        run: |
          set -euo pipefail
          # Allow up to 60s for the first request to succeed — new Fargate
          # tasks sometimes take a moment to register as healthy targets.
          for i in $(seq 1 12); do
            if curl -fsS --max-time 10 -k "https://${ALB_DNS}/api/health" -o /tmp/health.json; then
              cat /tmp/health.json
              grep -q '"status":"ok"' /tmp/health.json && exit 0
            fi
            echo "  [$i/12] health check not yet 200; retrying in 5s"
            sleep 5
          done
          echo "Smoke test failed: /api/health did not return 200." >&2
          exit 1
